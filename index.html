<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>外贸公司 - 全球贸易解决方案</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script src="config.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body {
            font-family: 'Inter', sans-serif;
        }
        .hero-section {
            background: linear-gradient(135deg, rgba(17, 24, 39, 0.95) 0%, rgba(17, 24, 39, 0.8) 100%), 
                        url('https://images.unsplash.com/photo-1553877522-43269d4ea984?w=1920&q=80');
            background-size: cover;
            background-position: center;
        }
        .card-hover {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .card-hover:hover {
            transform: translateY(-8px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }
        .gradient-text {
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .btn-gradient {
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            transition: all 0.3s ease;
        }
        .btn-gradient:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(59, 130, 246, 0.3);
        }
        .stat-number {
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
    </style>
</head>
<body class="bg-gray-50">
    <!-- 导航栏 -->
    <nav class="bg-white/95 backdrop-blur-md shadow-sm fixed w-full z-50">
        <div class="container mx-auto px-4 py-4">
            <div class="flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-gradient-to-br from-blue-500 to-purple-600 rounded-lg flex items-center justify-center">
                        <span class="text-white font-bold text-lg">T</span>
                    </div>
                    <a href="index.html" class="text-2xl font-bold text-gray-800">TradePro</a>
                </div>
                <div class="hidden lg:flex items-center gap-8" id="main-nav"></div>
                <div class="hidden lg:flex items-center gap-4">
                    <div class="relative">
                        <button id="lang-switcher" class="flex items-center gap-2 px-3 py-2 border border-gray-300 rounded-lg hover:border-blue-500 transition-colors">
                            <i class="fa fa-globe text-gray-600"></i>
                            <span id="current-lang" class="text-gray-700 font-medium">中文</span>
                            <i class="fa fa-chevron-down text-gray-400 text-xs"></i>
                        </button>
                        <div id="lang-dropdown" class="hidden absolute right-0 mt-2 w-32 bg-white rounded-lg shadow-lg border border-gray-100 py-1">
                            <button onclick="switchLanguage('zh')" class="w-full text-left px-4 py-2 text-gray-700 hover:bg-blue-50 text-sm">中文</button>
                            <button onclick="switchLanguage('en')" class="w-full text-left px-4 py-2 text-gray-700 hover:bg-blue-50 text-sm">English</button>
                        </div>
                    </div>
                    <a href="contact.html" class="btn-gradient px-5 py-2.5 rounded-lg font-medium text-white" data-lang="nav-contact-btn">联系我们</a>
                </div>
                <button id="mobile-menu-btn" class="lg:hidden text-gray-600">
                    <i class="fa fa-bars text-xl"></i>
                </button>
            </div>
        </div>
        <div id="mobile-menu" class="lg:hidden hidden bg-white border-t">
            <div class="container mx-auto px-4 py-4">
                <div class="flex flex-col gap-3" id="mobile-nav"></div>
            </div>
        </div>
    </nav>

    <!-- 英雄区域 -->
    <section class="hero-section min-h-screen flex items-center pt-20">
        <div class="container mx-auto px-4">
            <div class="max-w-4xl mx-auto text-center text-white" id="hero-content"></div>
        </div>
    </section>

    <!-- 数据统计 -->
    <section class="py-16 bg-white">
        <div class="container mx-auto px-4">
            <div class="grid grid-cols-2 md:grid-cols-4 gap-8 text-center" id="stats-container"></div>
        </div>
    </section>

    <!-- 解决方案 -->
    <section class="py-20 bg-gray-50">
        <div class="container mx-auto px-4">
            <div class="text-center mb-16" id="solutions-header"></div>
            <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-8" id="solutions-container"></div>
        </div>
    </section>

    <!-- 为什么选择我们 -->
    <section class="py-20 bg-white">
        <div class="container mx-auto px-4">
            <div class="flex flex-col lg:flex-row items-center gap-16" id="why-container"></div>
        </div>
    </section>

    <!-- 产品展示 -->
    <section class="py-20 bg-gray-50">
        <div class="container mx-auto px-4">
            <div class="text-center mb-16" id="products-header"></div>
            <div class="grid md:grid-cols-2 lg:grid-cols-4 gap-6" id="products-container"></div>
            <div class="text-center mt-12" id="products-more"></div>
        </div>
    </section>

    <!-- 客户案例 -->
    <section class="py-20 bg-gray-900 text-white">
        <div class="container mx-auto px-4">
            <div class="text-center mb-16" id="cases-header"></div>
            <div class="grid md:grid-cols-3 gap-8" id="cases-container"></div>
            <div class="text-center mt-12" id="cases-more"></div>
        </div>
    </section>

    <!-- 联系我们 -->
    <section class="py-20 bg-white">
        <div class="container mx-auto px-4">
            <div class="max-w-4xl mx-auto">
                <div class="text-center mb-12" id="cta-header"></div>
                <div class="flex flex-col sm:flex-row gap-4 justify-center" id="cta-buttons"></div>
            </div>
        </div>
    </section>

    <!-- 页脚 -->
    <footer class="bg-gray-900 text-white py-16">
        <div class="container mx-auto px-4">
            <div class="grid md:grid-cols-4 gap-12 mb-12" id="footer-container"></div>
            <div class="border-t border-gray-800 pt-8 text-center text-gray-400" id="footer-copyright"></div>
        </div>
    </footer>

    <script>
        let currentLang = siteConfig.site.language;

        function switchLanguage(lang) {
            currentLang = lang;
            document.getElementById('current-lang').textContent = lang === 'zh' ? '中文' : 'English';
            document.getElementById('lang-dropdown').classList.add('hidden');
            document.documentElement.lang = lang === 'zh' ? 'zh-CN' : 'en';
            updateContent();
        }

        function updateContent() {
            updateNavigation();
            updateHero();
            updateStats();
            updateSolutions();
            updateWhy();
            updateProducts();
            updateCases();
            updateCta();
            updateFooter();
        }

        function updateNavigation() {
            const navItems = siteConfig.navigation[currentLang];
            
            // 主导航
            const mainNav = document.getElementById('main-nav');
            mainNav.innerHTML = '';
            navItems.forEach(item => {
                const link = document.createElement('a');
                link.href = item.url;
                link.className = `nav-link font-medium ${window.location.pathname.includes(item.id) ? 'text-blue-600' : 'text-gray-600 hover:text-blue-600 transition-colors'}`;
                link.textContent = item.name;
                mainNav.appendChild(link);
            });

            // 移动端导航
            const mobileNav = document.getElementById('mobile-nav');
            mobileNav.innerHTML = '';
            navItems.forEach(item => {
                const link = document.createElement('a');
                link.href = item.url;
                link.className = `font-medium ${window.location.pathname.includes(item.id) ? 'text-blue-600' : 'text-gray-600 hover:text-blue-600'} py-2`;
                link.textContent = item.name;
                mobileNav.appendChild(link);
            });

            // 语言切换按钮
            const langButtons = document.createElement('div');
            langButtons.className = 'flex items-center gap-4 pt-3 border-t';
            langButtons.innerHTML = `
                <button onclick="switchLanguage('zh')" class="px-3 py-1 border rounded hover:border-blue-500 text-sm">中文</button>
                <button onclick="switchLanguage('en')" class="px-3 py-1 border rounded hover:border-blue-500 text-sm">English</button>
            `;
            mobileNav.appendChild(langButtons);
        }

        function updateHero() {
            const hero = siteConfig.home[currentLang].hero;
            const heroContent = document.getElementById('hero-content');
            heroContent.innerHTML = `
                <span class="inline-block px-4 py-2 bg-blue-500/20 border border-blue-400/30 rounded-full text-blue-300 text-sm font-medium mb-6">
                    ${hero.badge}
                </span>
                <h1 class="text-4xl md:text-6xl lg:text-7xl font-bold mb-6 leading-tight">
                    ${hero.title}
                </h1>
                <p class="text-lg md:text-xl text-gray-300 mb-10 max-w-2xl mx-auto">
                    ${hero.desc}
                </p>
                <div class="flex flex-col sm:flex-row gap-4 justify-center">
                    <a href="solutions.html" class="btn-gradient px-8 py-4 rounded-lg font-semibold text-white text-lg">
                        ${hero.btn1}
                    </a>
                    <a href="contact.html" class="px-8 py-4 rounded-lg font-semibold text-white border-2 border-white/30 hover:bg-white/10 transition-colors text-lg">
                        ${hero.btn2}
                    </a>
                </div>
            `;
        }

        function updateStats() {
            const stats = siteConfig.home[currentLang].stats;
            const statsContainer = document.getElementById('stats-container');
            statsContainer.innerHTML = '';
            stats.forEach(stat => {
                const statItem = document.createElement('div');
                statItem.className = 'stat-item';
                statItem.innerHTML = `
                    <div class="text-4xl md:text-5xl font-bold text-blue-600 mb-2">${stat.number}</div>
                    <div class="text-gray-600">${stat.text}</div>
                `;
                statsContainer.appendChild(statItem);
            });
        }

        function updateSolutions() {
            const solutions = siteConfig.home[currentLang].solutions;
            const solutionsHeader = document.getElementById('solutions-header');
            solutionsHeader.innerHTML = `
                <span class="text-blue-600 font-semibold text-sm tracking-wider uppercase">${solutions.tag}</span>
                <h2 class="text-3xl md:text-4xl font-bold text-gray-900 mt-3">${solutions.title}</h2>
                <p class="text-gray-600 mt-4 max-w-2xl mx-auto">
                    ${solutions.desc}
                </p>
            `;

            const solutionsContainer = document.getElementById('solutions-container');
            solutionsContainer.innerHTML = '';
            solutions.items.forEach((item, index) => {
                const colors = ['blue', 'purple', 'green', 'orange', 'red', 'indigo'];
                const color = colors[index % colors.length];
                const solutionItem = document.createElement('div');
                solutionItem.className = 'card-hover bg-white rounded-2xl p-8 border border-gray-100';
                solutionItem.innerHTML = `
                    <div class="w-14 h-14 bg-${color}-100 rounded-xl flex items-center justify-center mb-6">
                        <i class="fa ${item.icon} text-2xl text-${color}-600"></i>
                    </div>
                    <h3 class="text-xl font-bold text-gray-900 mb-3">${item.title}</h3>
                    <p class="text-gray-600 mb-6">${item.desc}</p>
                    <a href="solutions.html" class="text-blue-600 font-semibold inline-flex items-center gap-2 hover:gap-3 transition-all">了解更多 <i class="fa fa-arrow-right"></i></a>
                `;
                solutionsContainer.appendChild(solutionItem);
            });
        }

        function updateWhy() {
            const whyContainer = document.getElementById('why-container');
            whyContainer.innerHTML = `
                <div class="lg:w-1/2">
                    <span class="text-blue-600 font-semibold text-sm tracking-wider uppercase">为什么选择我们</span>
                    <h2 class="text-3xl md:text-4xl font-bold text-gray-900 mt-3 mb-6">您的全球贸易伙伴</h2>
                    <p class="text-gray-600 mb-8">我们不仅是供应商，更是您的长期合作伙伴。凭借丰富的行业经验和专业的团队，我们致力于为您提供超越期望的价值。</p>
                    <div class="space-y-6">
                        <div class="flex gap-4">
                            <div class="w-12 h-12 bg-blue-100 rounded-lg flex items-center justify-center flex-shrink-0">
                                <i class="fa fa-lightbulb-o text-xl text-blue-600"></i>
                            </div>
                            <div>
                                <h4 class="font-bold text-gray-900 mb-1">创新思维</h4>
                                <p class="text-gray-600 text-sm">不断寻找创新解决方案，为您的品牌带来差异化竞争优势</p>
                            </div>
                        </div>
                        <div class="flex gap-4">
                            <div class="w-12 h-12 bg-purple-100 rounded-lg flex items-center justify-center flex-shrink-0">
                                <i class="fa fa-handshake-o text-xl text-purple-600"></i>
                            </div>
                            <div>
                                <h4 class="font-bold text-gray-900 mb-1">灵活合作</h4>
                                <p class="text-gray-600 text-sm">根据您的需求提供定制化服务方案，灵活适应各种项目规模</p>
                            </div>
                        </div>
                        <div class="flex gap-4">
                            <div class="w-12 h-12 bg-green-100 rounded-lg flex items-center justify-center flex-shrink-0">
                                <i class="fa fa-check-circle-o text-xl text-green-600"></i>
                            </div>
                            <div>
                                <h4 class="font-bold text-gray-900 mb-1">品质保证</h4>
                                <p class="text-gray-600 text-sm">严格的质量控制体系，确保每一件产品都达到最高标准</p>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="lg:w-1/2">
                    <img src="https://images.unsplash.com/photo-1553877522-43269d4ea984?w=800&q=80" alt="团队协作" class="rounded-2xl shadow-2xl w-full">
                </div>
            `;
        }

        function updateProducts() {
            const products = siteConfig.home[currentLang].products;
            const productsHeader = document.getElementById('products-header');
            productsHeader.innerHTML = `
                <span class="text-blue-600 font-semibold text-sm tracking-wider uppercase">${products.tag}</span>
                <h2 class="text-3xl md:text-4xl font-bold text-gray-900 mt-3">${products.title}</h2>
            `;

            const productsContainer = document.getElementById('products-container');
            productsContainer.innerHTML = '';
            products.items.forEach((item, index) => {
                const colors = ['blue', 'purple', 'green', 'orange'];
                const color = colors[index % colors.length];
                const icons = ['fa-mobile-phone', 'fa-cutlery', 'fa-leaf', 'fa-briefcase'];
                const icon = icons[index % icons.length];
                const productItem = document.createElement('div');
                productItem.className = 'card-hover bg-white rounded-xl overflow-hidden';
                productItem.innerHTML = `
                    <div class="h-48 bg-gradient-to-br from-${color}-100 to-${color}-200 flex items-center justify-center">
                        <i class="fa ${icon} text-6xl text-${color}-400"></i>
                    </div>
                    <div class="p-6">
                        <h3 class="font-bold text-gray-900 mb-2">${item.name}</h3>
                        <p class="text-gray-600 text-sm mb-4">${item.desc}</p>
                    </div>
                `;
                productsContainer.appendChild(productItem);
            });

            const productsMore = document.getElementById('products-more');
            productsMore.innerHTML = `
                <a href="products.html" class="btn-gradient px-8 py-3 rounded-lg font-semibold text-white inline-flex items-center gap-2">查看全部产品 <i class="fa fa-arrow-right"></i></a>
            `;
        }

        function updateCases() {
            const cases = siteConfig.home[currentLang].cases;
            const casesHeader = document.getElementById('cases-header');
            casesHeader.innerHTML = `
                <span class="text-blue-400 font-semibold text-sm tracking-wider uppercase">${cases.tag}</span>
                <h2 class="text-3xl md:text-4xl font-bold mt-3">${cases.title}</h2>
            `;

            const casesContainer = document.getElementById('cases-container');
            casesContainer.innerHTML = '';
            cases.items.forEach((item, index) => {
                const colors = ['blue', 'purple', 'green'];
                const color = colors[index % colors.length];
                const initials = item.name.split(' ')[0][0];
                const caseItem = document.createElement('div');
                caseItem.className = 'bg-gray-800/50 rounded-2xl p-8 border border-gray-700';
                caseItem.innerHTML = `
                    <div class="text-4xl text-blue-400 mb-4">"</div>
                    <p class="text-gray-300 mb-6">${item.desc}</p>
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 bg-${color}-500 rounded-full flex items-center justify-center font-bold">${initials}</div>
                        <div>
                            <div class="font-semibold">${item.name}</div>
                            <div class="text-gray-400 text-sm">客户</div>
                        </div>
                    </div>
                `;
                casesContainer.appendChild(caseItem);
            });

            const casesMore = document.getElementById('cases-more');
            casesMore.innerHTML = `
                <a href="cases.html" class="px-8 py-3 rounded-lg font-semibold border-2 border-blue-400 text-blue-400 hover:bg-blue-400 hover:text-white transition-colors inline-flex items-center gap-2">查看更多案例 <i class="fa fa-arrow-right"></i></a>
            `;
        }

        function updateCta() {
            const cta = siteConfig.home[currentLang].cta;
            const ctaHeader = document.getElementById('cta-header');
            ctaHeader.innerHTML = `
                <span class="text-blue-600 font-semibold text-sm tracking-wider uppercase">${cta.tag}</span>
                <h2 class="text-3xl md:text-4xl font-bold text-gray-900 mt-3">${cta.title}</h2>
                <p class="text-gray-600 mt-4">${cta.desc}</p>
            `;

            const ctaButtons = document.getElementById('cta-buttons');
            ctaButtons.innerHTML = `
                <a href="contact.html" class="btn-gradient px-8 py-4 rounded-lg font-semibold text-white text-lg text-center">${cta.btn}</a>
                <a href="tel:+8612345678910" class="px-8 py-4 rounded-lg font-semibold border-2 border-gray-300 text-gray-700 hover:border-blue-500 hover:text-blue-600 transition-colors text-lg text-center">
                    <i class="fa fa-phone mr-2"></i> +86 123 4567 8910
                </a>
            `;
        }

        function updateFooter() {
            const footer = siteConfig.footer[currentLang];
            const footerContainer = document.getElementById('footer-container');
            footerContainer.innerHTML = `
                <div>
                    <div class="flex items-center gap-3 mb-6">
                        <div class="w-10 h-10 bg-gradient-to-br from-blue-500 to-purple-600 rounded-lg flex items-center justify-center">
                            <span class="text-white font-bold text-lg">${siteConfig.site.logo.icon}</span>
                        </div>
                        <span class="text-xl font-bold">${siteConfig.site.logo.text}</span>
                    </div>
                    <p class="text-gray-400">${footer.description}</p>
                </div>
                <div>
                    <h4 class="font-bold mb-4">${footer.quickLinks.title}</h4>
                    <ul class="space-y-2">
                        ${footer.quickLinks.links.slice(1, 5).map(link => `<li><a href="${link.url}" class="text-gray-400 hover:text-white transition-colors">${link.name}</a></li>`).join('')}
                    </ul>
                </div>
                <div>
                    <h4 class="font-bold mb-4">${footer.contact.title}</h4>
                    <ul class="space-y-2 text-gray-400">
                        <li><i class="fa fa-map-marker mr-2"></i> ${footer.contact.address}</li>
                        <li><i class="fa fa-phone mr-2"></i> ${footer.contact.phone}</li>
                        <li><i class="fa fa-envelope mr-2"></i> ${footer.contact.email}</li>
                    </ul>
                </div>
                <div>
                    <h4 class="font-bold mb-4">${footer.follow.title}</h4>
                    <div class="flex gap-4">
                        ${footer.follow.social.map(social => `<a href="${social.url}" class="w-10 h-10 bg-gray-800 rounded-full flex items-center justify-center hover:bg-blue-600 transition-colors"><i class="fa ${social.icon}"></i></a>`).join('')}
                    </div>
                </div>
            `;

            const footerCopyright = document.getElementById('footer-copyright');
            footerCopyright.innerHTML = `
                <p>&copy; 2026 ${siteConfig.site.name}. ${footer.rights}</p>
            `;
        }

        document.getElementById('lang-switcher').addEventListener('click', function(e) {
            e.stopPropagation();
            document.getElementById('lang-dropdown').classList.toggle('hidden');
        });

        document.addEventListener('click', function() {
            document.getElementById('lang-dropdown').classList.add('hidden');
        });

        document.getElementById('mobile-menu-btn').addEventListener('click', function() {
            document.getElementById('mobile-menu').classList.toggle('hidden');
        });

        // 初始化页面内容
        updateContent();
    </script>
</body>
</html>
