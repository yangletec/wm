<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>关于我们 - TradePro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script src="config.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .btn-gradient { background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%); transition: all 0.3s ease; }
        .btn-gradient:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(59, 130, 246, 0.3); }
        .stat-number { background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    </style>
</head>
<body class="bg-gray-50">
    <nav class="bg-white/95 backdrop-blur-md shadow-sm fixed w-full z-50">
        <div class="container mx-auto px-4 py-4">
            <div class="flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-gradient-to-br from-blue-500 to-purple-600 rounded-lg flex items-center justify-center">
                        <span class="text-white font-bold text-lg">T</span>
                    </div>
                    <a href="index.html" class="text-2xl font-bold text-gray-800">TradePro</a>
                </div>
                <div class="hidden lg:flex items-center gap-8" id="main-nav"></div>
                <div class="hidden lg:flex items-center gap-4">
                    <div class="relative">
                        <button id="lang-switcher" class="flex items-center gap-2 px-3 py-2 border border-gray-300 rounded-lg hover:border-blue-500 transition-colors">
                            <i class="fa fa-globe text-gray-600"></i>
                            <span id="current-lang" class="text-gray-700 font-medium">中文</span>
                            <i class="fa fa-chevron-down text-gray-400 text-xs"></i>
                        </button>
                        <div id="lang-dropdown" class="hidden absolute right-0 mt-2 w-32 bg-white rounded-lg shadow-lg border border-gray-100 py-1">
                            <button onclick="switchLanguage('zh')" class="w-full text-left px-4 py-2 text-gray-700 hover:bg-blue-50 text-sm">中文</button>
                            <button onclick="switchLanguage('en')" class="w-full text-left px-4 py-2 text-gray-700 hover:bg-blue-50 text-sm">English</button>
                        </div>
                    </div>
                    <a href="contact.html" class="btn-gradient px-5 py-2.5 rounded-lg font-medium text-white" data-lang="nav-contact-btn">联系我们</a>
                </div>
                <button id="mobile-menu-btn" class="lg:hidden text-gray-600"><i class="fa fa-bars text-xl"></i></button>
            </div>
        </div>
        <div id="mobile-menu" class="lg:hidden hidden bg-white border-t">
            <div class="container mx-auto px-4 py-4">
                <div class="flex flex-col gap-3" id="mobile-nav"></div>
            </div>
        </div>
    </nav>

    <section class="pt-32 pb-20 bg-gradient-to-br from-blue-600 to-purple-700 text-white">
        <div class="container mx-auto px-4">
            <div class="max-w-3xl" id="page-header"></div>
        </div>
    </section>

    <section class="py-20 bg-white">
        <div class="container mx-auto px-4">
            <div class="grid md:grid-cols-4 gap-8 mb-16" id="stats-container"></div>
        </div>
    </section>

    <section class="py-20 bg-gray-50">
        <div class="container mx-auto px-4">
            <div class="flex flex-col lg:flex-row items-center gap-16" id="story-content"></div>
        </div>
    </section>

    <section class="py-20 bg-white">
        <div class="container mx-auto px-4">
            <div class="text-center mb-16" id="values-header"></div>
            <div class="grid md:grid-cols-3 gap-8" id="values-container"></div>
        </div>
    </section>

    <section class="py-20 bg-gray-900 text-white">
        <div class="container mx-auto px-4">
            <div class="text-center mb-16" id="team-header"></div>
            <div class="grid md:grid-cols-4 gap-8" id="team-container"></div>
        </div>
    </section>

    <section class="py-20 bg-white">
        <div class="container mx-auto px-4 text-center" id="cta-content"></div>
    </section>

    <footer class="bg-gray-900 text-white py-12" id="footer-content"></footer>

    <script>
        let currentLang = 'zh';

        function updateNavigation() {
            const mainNav = document.getElementById('main-nav');
            const mobileNav = document.getElementById('mobile-nav');
            const navItems = siteConfig.navigation[currentLang];
            
            mainNav.innerHTML = '';
            navItems.forEach(item => {
                const a = document.createElement('a');
                a.href = item.url;
                a.className = `nav-link font-medium ${item.id === 'about' ? 'text-blue-600' : 'text-gray-600 hover:text-blue-600 transition-colors'}`;
                a.textContent = item.name;
                mainNav.appendChild(a);
            });
            
            mobileNav.innerHTML = '';
            navItems.forEach(item => {
                const a = document.createElement('a');
                a.href = item.url;
                a.className = `font-medium ${item.id === 'about' ? 'text-blue-600' : 'text-gray-600 hover:text-blue-600'} py-2`;
                a.textContent = item.name;
                mobileNav.appendChild(a);
            });
            
            const langDiv = document.createElement('div');
            langDiv.className = 'flex items-center gap-4 pt-3 border-t';
            langDiv.innerHTML = `
                <button onclick="switchLanguage('zh')" class="px-3 py-1 border rounded hover:border-blue-500 text-sm">中文</button>
                <button onclick="switchLanguage('en')" class="px-3 py-1 border rounded hover:border-blue-500 text-sm">English</button>
            `;
            mobileNav.appendChild(langDiv);
        }

        function updatePageHeader() {
            const header = document.getElementById('page-header');
            const content = siteConfig.about[currentLang].page;
            header.innerHTML = `
                <span class="text-blue-200 font-semibold text-sm tracking-wider uppercase">${content.tag}</span>
                <h1 class="text-4xl md:text-5xl font-bold mt-3 mb-6">${content.title}</h1>
                <p class="text-xl text-blue-100">${content.desc}</p>
            `;
        }

        function updateStats() {
            const container = document.getElementById('stats-container');
            const stats = siteConfig.about[currentLang].stats;
            container.innerHTML = '';
            
            stats.forEach(stat => {
                const statDiv = document.createElement('div');
                statDiv.className = 'text-center';
                statDiv.innerHTML = `
                    <div class="text-5xl font-bold stat-number mb-2">${stat.number}</div>
                    <div class="text-gray-600">${stat.text}</div>
                `;
                container.appendChild(statDiv);
            });
        }

        function updateStory() {
            const content = document.getElementById('story-content');
            const story = siteConfig.about[currentLang].story;
            content.innerHTML = `
                <div class="lg:w-1/2">
                    <span class="text-blue-600 font-semibold text-sm tracking-wider uppercase">${story.tag}</span>
                    <h2 class="text-3xl md:text-4xl font-bold text-gray-900 mt-3 mb-6">${story.title}</h2>
                    <p class="text-gray-600 mb-6">${story.desc1}</p>
                    <p class="text-gray-600 mb-6">${story.desc2}</p>
                    <p class="text-gray-600 mb-6">${story.desc3}</p>
                </div>
                <div class="lg:w-1/2">
                    <img src="https://images.unsplash.com/photo-1553877522-43269d4ea984?w=800&q=80" alt="团队协作" class="rounded-2xl shadow-2xl">
                </div>
            `;
        }

        function updateValues() {
            const header = document.getElementById('values-header');
            const container = document.getElementById('values-container');
            header.innerHTML = `
                <span class="text-blue-600 font-semibold text-sm tracking-wider uppercase">核心价值</span>
                <h2 class="text-3xl md:text-4xl font-bold text-gray-900 mt-3">我们的价值观</h2>
            `;
            
            container.innerHTML = '';
            const values = [
                {
                    title: '诚信为本',
                    desc: '诚实守信是我们的立身之本，也是与客户建立长期合作关系的基础。',
                    icon: 'fa-check-circle',
                    color: 'text-blue-600'
                },
                {
                    title: '客户至上',
                    desc: '客户的需求是我们工作的出发点，我们致力于为客户提供最优质的服务。',
                    icon: 'fa-users',
                    color: 'text-purple-600'
                },
                {
                    title: '创新进取',
                    desc: '不断创新是我们发展的动力，我们积极探索新的贸易模式和解决方案。',
                    icon: 'fa-lightbulb-o',
                    color: 'text-yellow-600'
                }
            ];
            
            values.forEach((value, index) => {
                const valueDiv = document.createElement('div');
                valueDiv.className = 'text-center p-8';
                valueDiv.innerHTML = `
                    <div class="w-16 h-16 bg-gray-100 rounded-xl flex items-center justify-center mx-auto mb-6">
                        <i class="fa ${value.icon} text-2xl ${value.color}"></i>
                    </div>
                    <h3 class="text-xl font-bold text-gray-900 mb-3">${value.title}</h3>
                    <p class="text-gray-600">${value.desc}</p>
                `;
                container.appendChild(valueDiv);
            });
        }

        function updateTeam() {
            const header = document.getElementById('team-header');
            const container = document.getElementById('team-container');
            const team = siteConfig.about[currentLang].team;
            
            header.innerHTML = `
                <span class="text-blue-400 font-semibold text-sm tracking-wider uppercase">专业团队</span>
                <h2 class="text-3xl md:text-4xl font-bold mt-3">${team.title}</h2>
            `;
            
            container.innerHTML = '';
            const colors = ['blue', 'purple', 'green'];
            
            team.members.forEach((member, index) => {
                const memberDiv = document.createElement('div');
                memberDiv.className = 'text-center';
                const color = colors[index % colors.length];
                const initial = member.name.split(' ')[0][0];
                
                memberDiv.innerHTML = `
                    <div class="w-32 h-32 bg-${color}-600 rounded-full mx-auto mb-4 flex items-center justify-center">
                        <span class="text-white text-4xl font-bold">${initial}</span>
                    </div>
                    <h3 class="text-xl font-bold mb-1">${member.name}</h3>
                    <p class="text-blue-400 mb-2">${member.position}</p>
                    <p class="text-gray-400 text-sm">${member.desc}</p>
                `;
                container.appendChild(memberDiv);
            });
        }

        function updateCta() {
            const cta = document.getElementById('cta-content');
            const content = siteConfig.about[currentLang].cta;
            cta.innerHTML = `
                <h2 class="text-3xl md:text-4xl font-bold mb-6">${content.title}</h2>
                <p class="text-gray-600 mb-8 max-w-2xl mx-auto">${content.desc}</p>
                <a href="contact.html" class="btn-gradient px-8 py-4 rounded-lg font-semibold text-white inline-flex items-center gap-2">${content.btn} <i class="fa fa-arrow-right"></i></a>
            `;
        }

        function updateFooter() {
            const footer = document.getElementById('footer-content');
            const content = siteConfig.footer[currentLang];
            footer.innerHTML = `
                <div class="container mx-auto px-4">
                    <div class="grid md:grid-cols-4 gap-12 mb-12">
                        <div>
                            <div class="flex items-center gap-3 mb-6">
                                <div class="w-10 h-10 bg-gradient-to-br from-blue-500 to-purple-600 rounded-lg flex items-center justify-center">
                                    <span class="text-white font-bold text-lg">${siteConfig.site.logo.icon}</span>
                                </div>
                                <span class="text-xl font-bold">${siteConfig.site.name}</span>
                            </div>
                            <p class="text-gray-400">${content.description}</p>
                        </div>
                        <div>
                            <h4 class="font-bold mb-4">${content.quickLinks.title}</h4>
                            <ul class="space-y-2">
                                ${content.quickLinks.links.map(link => `<li><a href="${link.url}" class="text-gray-400 hover:text-white transition-colors">${link.name}</a></li>`).join('')}
                            </ul>
                        </div>
                        <div>
                            <h4 class="font-bold mb-4">${content.contact.title}</h4>
                            <ul class="space-y-2 text-gray-400">
                                <li><i class="fa fa-map-marker mr-2"></i> ${content.contact.address}</li>
                                <li><i class="fa fa-phone mr-2"></i> ${content.contact.phone}</li>
                                <li><i class="fa fa-envelope mr-2"></i> ${content.contact.email}</li>
                            </ul>
                        </div>
                        <div>
                            <h4 class="font-bold mb-4">${content.follow.title}</h4>
                            <div class="flex gap-4">
                                ${content.follow.social.map(social => `<a href="${social.url}" class="w-10 h-10 bg-gray-800 rounded-full flex items-center justify-center hover:bg-blue-600 transition-colors"><i class="fa ${social.icon}"></i></a>`).join('')}
                            </div>
                        </div>
                    </div>
                    <div class="border-t border-gray-800 pt-8 text-center text-gray-400">
                        <p>&copy; 2026 ${siteConfig.site.name}. ${content.rights}</p>
                    </div>
                </div>
            `;
        }

        function updateContent() {
            updateNavigation();
            updatePageHeader();
            updateStats();
            updateStory();
            updateValues();
            updateTeam();
            updateCta();
            updateFooter();
        }

        function switchLanguage(lang) {
            currentLang = lang;
            updateContent();
            document.getElementById('current-lang').textContent = currentLang === 'zh' ? '中文' : 'English';
            document.getElementById('lang-dropdown').classList.add('hidden');
            document.documentElement.lang = currentLang === 'zh' ? 'zh-CN' : 'en';
        }

        document.getElementById('lang-switcher').addEventListener('click', function(e) {
            e.stopPropagation();
            document.getElementById('lang-dropdown').classList.toggle('hidden');
        });
        document.addEventListener('click', function() { document.getElementById('lang-dropdown').classList.add('hidden'); });
        document.getElementById('mobile-menu-btn').addEventListener('click', function() { document.getElementById('mobile-menu').classList.toggle('hidden'); });

        // Initialize
        updateContent();
    </script>
</body>
</html>
