<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="keywords" id="meta-keywords">
    <meta name="description" id="meta-description">
    <meta name="author" id="meta-author">
    <title id="page-title"></title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script src="config.js"></script>
    <script>
        // 设置SEO元标签
        document.addEventListener('DOMContentLoaded', function() {
            const seo = siteConfig.seo.zh.news;
            const siteSeo = siteConfig.site.seo;
            
            document.getElementById('page-title').textContent = seo.title;
            document.getElementById('meta-description').setAttribute('content', seo.description);
            document.getElementById('meta-keywords').setAttribute('content', siteSeo.keywords);
            document.getElementById('meta-author').setAttribute('content', siteSeo.author);
            
            // 加载配色方案
            loadColorScheme();
        });
        
        // 加载配色方案
        function loadColorScheme() {
            const colors = siteConfig.colors[siteConfig.colors.current];
            const root = document.documentElement;
            
            // 设置CSS变量
            root.style.setProperty('--primary-color', colors.primary);
            root.style.setProperty('--secondary-color', colors.secondary);
            root.style.setProperty('--accent-color', colors.accent);
            root.style.setProperty('--white-color', colors.white || colors.primary);
            root.style.setProperty('--light-gray', colors.lightGray);
            root.style.setProperty('--medium-gray', colors.mediumGray);
            root.style.setProperty('--dark-gray', colors.darkGray);
            root.style.setProperty('--text-color', colors.text || colors.darkGray);
            root.style.setProperty('--dark-text', colors.darkText || colors.black || colors.darkGray);
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        :root {
            --primary-color: #1e40af;
            --secondary-color: #3b82f6;
            --accent-color: #93c5fd;
            --white-color: #ffffff;
            --light-gray: #f3f4f6;
            --medium-gray: #9ca3af;
            --dark-gray: #374151;
            --text-color: #374151;
            --dark-text: #111827;
        }
        body { font-family: 'Inter', sans-serif; color: var(--text-color); }
        .btn-gradient { background: linear-gradient(135deg, var(--secondary-color) 0%, #8b5cf6 100%); transition: all 0.3s ease; }
        .btn-gradient:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(59, 130, 246, 0.3); }
        .card-hover { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .card-hover:hover { transform: translateY(-8px); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25); }
    </style>
</head>
<body class="bg-gray-50">
    <nav class="bg-white/95 backdrop-blur-md shadow-sm fixed w-full z-50">
        <div class="container mx-auto px-4 py-4">
            <div class="flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-gradient-to-br from-blue-500 to-purple-600 rounded-lg flex items-center justify-center">
                        <span class="text-white font-bold text-lg">T</span>
                    </div>
                    <a href="index.html" class="text-2xl font-bold text-gray-800">TradePro</a>
                </div>
                <div class="hidden lg:flex items-center gap-8" id="main-nav"></div>
                <div class="hidden lg:flex items-center gap-4">
                    <a href="contact.html" class="btn-gradient px-5 py-2.5 rounded-lg font-medium text-white">联系我们</a>
                </div>
                <button id="mobile-menu-btn" class="lg:hidden text-gray-600"><i class="fa fa-bars text-xl"></i></button>
            </div>
        </div>
        <div id="mobile-menu" class="lg:hidden hidden bg-white border-t">
            <div class="container mx-auto px-4 py-4">
                <div class="flex flex-col gap-3" id="mobile-nav"></div>
            </div>
        </div>
    </nav>

    <section class="pt-32 pb-20 bg-gradient-to-br from-blue-600 to-purple-700 text-white">
        <div class="container mx-auto px-4">
            <div class="max-w-3xl" id="page-header"></div>
        </div>
    </section>

    <section class="py-16 bg-white">
        <div class="container mx-auto px-4">
            <div class="flex flex-wrap gap-4 justify-center mb-12" id="news-filters"></div>
        </div>
    </section>

    <section class="py-12 bg-gray-50">
        <div class="container mx-auto px-4">
            <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-8" id="news-grid"></div>
            <div class="flex justify-center mt-12" id="news-pagination"></div>
        </div>
    </section>

    <section class="py-20 bg-gray-900 text-white">
        <div class="container mx-auto px-4 text-center" id="subscribe-content"></div>
    </section>

    <footer class="bg-gray-900 text-white py-12" id="footer-content"></footer>

    <script>
        function updateNavigation() {
            const mainNav = document.getElementById('main-nav');
            const mobileNav = document.getElementById('mobile-nav');
            const navItems = siteConfig.navigation.zh;
            
            mainNav.innerHTML = '';
            navItems.forEach(item => {
                const a = document.createElement('a');
                a.href = item.url;
                a.className = `nav-link font-medium ${item.id === 'news' ? 'text-blue-600' : 'text-gray-600 hover:text-blue-600 transition-colors'}`;
                a.textContent = item.name;
                mainNav.appendChild(a);
            });
            
            mobileNav.innerHTML = '';
            navItems.forEach(item => {
                const a = document.createElement('a');
                a.href = item.url;
                a.className = `font-medium ${item.id === 'news' ? 'text-blue-600' : 'text-gray-600 hover:text-blue-600'} py-2`;
                a.textContent = item.name;
                mobileNav.appendChild(a);
            });
        }

        function updatePageHeader() {
            const header = document.getElementById('page-header');
            const content = siteConfig.news.zh.page;
            header.innerHTML = `
                <span class="text-blue-200 font-semibold text-sm tracking-wider uppercase">${content.tag}</span>
                <h1 class="text-4xl md:text-5xl font-bold mt-3 mb-6">${content.title}</h1>
                <p class="text-xl text-blue-100">${content.desc}</p>
            `;
        }

        function updateNewsFilters() {
            const filters = document.getElementById('news-filters');
            const filtersList = siteConfig.news.zh.filters;
            filters.innerHTML = '';
            
            // Add filters
            filtersList.forEach((filter, index) => {
                const filterBtn = document.createElement('button');
                filterBtn.className = `px-6 py-2 ${index === 0 ? 'bg-blue-600 text-white' : 'bg-gray-200 text-gray-700'} rounded-full hover:bg-gray-300`;
                filterBtn.setAttribute('data-filter', filter.toLowerCase());
                filterBtn.textContent = filter;
                filters.appendChild(filterBtn);
            });
            
            // Add filter functionality
            document.querySelectorAll('#news-filters button').forEach(button => {
                button.addEventListener('click', function() {
                    document.querySelectorAll('#news-filters button').forEach(btn => {
                        btn.classList.remove('bg-blue-600', 'text-white');
                        btn.classList.add('bg-gray-200', 'text-gray-700');
                    });
                    this.classList.remove('bg-gray-200', 'text-gray-700');
                    this.classList.add('bg-blue-600', 'text-white');
                    
                    const filter = this.getAttribute('data-filter');
                    document.querySelectorAll('.news-card').forEach(card => {
                        if (filter === 'all' || card.getAttribute('data-category').toLowerCase() === filter) {
                            card.style.display = 'block';
                        } else {
                            card.style.display = 'none';
                        }
                    });
                });
            });
        }

        function updateNews() {
            const grid = document.getElementById('news-grid');
            const news = siteConfig.news.zh.items;
            grid.innerHTML = '';
            
            const colors = ['blue', 'purple', 'green', 'orange'];
            
            const newsLinks = [
                'article/20260420-company-award.html',
                'article/20260415-trade-trends.html',
                'article/20260410-canton-fair.html',
                'article/20260405-anniversary.html',
                'article/20260328-southeast-asia.html',
                'article/20260320-strategic-cooperation.html'
            ];
            
            news.forEach((item, index) => {
                const newsCard = document.createElement('div');
                newsCard.className = 'news-card card-hover bg-white rounded-xl overflow-hidden';
                newsCard.setAttribute('data-category', item.category);
                
                const color = colors[index % colors.length];
                const link = newsLinks[index];
                
                newsCard.innerHTML = `
                    <div class="h-48 bg-${color}-600 flex items-center justify-center">
                        <i class="fa fa-newspaper-o text-6xl text-white"></i>
                    </div>
                    <div class="p-6">
                        <div class="flex justify-between items-center mb-4">
                            <span class="text-sm text-gray-500">${item.date}</span>
                            <span class="px-3 py-1 bg-${color}-100 text-${color}-600 text-xs rounded-full">${item.category}</span>
                        </div>
                        <h3 class="text-xl font-bold text-gray-900 mb-3">${item.title}</h3>
                        <p class="text-gray-600 mb-4">${item.desc}</p>
                        <a href="${link}" class="text-blue-600 font-semibold inline-flex items-center gap-2 hover:gap-3 transition-all">阅读更多 <i class="fa fa-arrow-right"></i></a>
                    </div>
                `;
                grid.appendChild(newsCard);
            });
        }

        function updatePagination() {
            const pagination = document.getElementById('news-pagination');
            pagination.innerHTML = `
                <nav class="inline-flex rounded-md shadow">
                    <a href="#" class="px-3 py-2 rounded-l-md border border-gray-300 bg-white text-sm font-medium text-gray-500 hover:bg-gray-50">上一页</a>
                    <a href="#" class="px-3 py-2 border-t border-b border-gray-300 bg-blue-600 text-sm font-medium text-white">1</a>
                    <a href="#" class="px-3 py-2 border-t border-b border-gray-300 bg-white text-sm font-medium text-gray-500 hover:bg-gray-50">2</a>
                    <a href="#" class="px-3 py-2 border-t border-b border-gray-300 bg-white text-sm font-medium text-gray-500 hover:bg-gray-50">3</a>
                    <a href="#" class="px-3 py-2 rounded-r-md border border-gray-300 bg-white text-sm font-medium text-gray-500 hover:bg-gray-50">下一页</a>
                </nav>
            `;
        }

        function updateSubscribe() {
            const subscribe = document.getElementById('subscribe-content');
            const content = siteConfig.news.zh.cta;
            subscribe.innerHTML = `
                <h2 class="text-3xl md:text-4xl font-bold mb-6">${content.title}</h2>
                <p class="text-gray-400 mb-8 max-w-2xl mx-auto">${content.desc}</p>
                <div class="max-w-md mx-auto flex gap-2">
                    <input type="email" placeholder="${content.placeholder}" class="flex-1 px-4 py-3 rounded-lg focus:outline-none text-gray-800">
                    <button class="btn-gradient px-6 py-3 rounded-lg font-semibold text-white">${content.btn}</button>
                </div>
            `;
        }

        function updateFooter() {
            const footer = document.getElementById('footer-content');
            const content = siteConfig.footer.zh;
            footer.innerHTML = `
                <div class="container mx-auto px-4">
                    <div class="grid md:grid-cols-4 gap-12 mb-12">
                        <div>
                            <div class="flex items-center gap-3 mb-6">
                                <div class="w-10 h-10 bg-gradient-to-br from-blue-500 to-purple-600 rounded-lg flex items-center justify-center">
                                    <span class="text-white font-bold text-lg">${siteConfig.site.logo.icon}</span>
                                </div>
                                <span class="text-xl font-bold">${siteConfig.site.name}</span>
                            </div>
                            <p class="text-gray-400">${content.description}</p>
                        </div>
                        <div>
                            <h4 class="font-bold mb-4">${content.quickLinks.title}</h4>
                            <ul class="space-y-2">
                                ${content.quickLinks.links.map(link => `<li><a href="${link.url}" class="text-gray-400 hover:text-white transition-colors">${link.name}</a></li>`).join('')}
                            </ul>
                        </div>
                        <div>
                            <h4 class="font-bold mb-4">${content.contact.title}</h4>
                            <ul class="space-y-2 text-gray-400">
                                <li><i class="fa fa-map-marker mr-2"></i> ${content.contact.address}</li>
                                <li><i class="fa fa-phone mr-2"></i> ${content.contact.phone}</li>
                                <li><i class="fa fa-envelope mr-2"></i> ${content.contact.email}</li>
                            </ul>
                        </div>
                        <div>
                            <h4 class="font-bold mb-4">${content.follow.title}</h4>
                            <div class="flex gap-4">
                                ${content.follow.social.map(social => `<a href="${social.url}" class="w-10 h-10 bg-gray-800 rounded-full flex items-center justify-center hover:bg-blue-600 transition-colors"><i class="fa ${social.icon}"></i></a>`).join('')}
                            </div>
                        </div>
                    </div>
                    <div class="border-t border-gray-800 pt-8 text-center text-gray-400">
                        <p>&copy; 2026 ${siteConfig.site.name}. ${content.rights}</p>
                    </div>
                </div>
            `;
        }

        function updateContent() {
            updateNavigation();
            updatePageHeader();
            updateNewsFilters();
            updateNews();
            updatePagination();
            updateSubscribe();
            updateFooter();
        }

        document.getElementById('mobile-menu-btn').addEventListener('click', function() { document.getElementById('mobile-menu').classList.toggle('hidden'); });

        // Initialize
        updateContent();
    </script>
</body>
</html>
