<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>联系我们 - TradePro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script src="config.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .btn-gradient { background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%); transition: all 0.3s ease; }
        .btn-gradient:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(59, 130, 246, 0.3); }
        .form-input:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2); }
    </style>
</head>
<body class="bg-gray-50">
    <nav class="bg-white/95 backdrop-blur-md shadow-sm fixed w-full z-50">
        <div class="container mx-auto px-4 py-4">
            <div class="flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-gradient-to-br from-blue-500 to-purple-600 rounded-lg flex items-center justify-center">
                        <span class="text-white font-bold text-lg">T</span>
                    </div>
                    <a href="index.html" class="text-2xl font-bold text-gray-800">TradePro</a>
                </div>
                <div class="hidden lg:flex items-center gap-8" id="main-nav"></div>
                <div class="hidden lg:flex items-center gap-4">
                    <div class="relative">
                        <button id="lang-switcher" class="flex items-center gap-2 px-3 py-2 border border-gray-300 rounded-lg hover:border-blue-500 transition-colors">
                            <i class="fa fa-globe text-gray-600"></i>
                            <span id="current-lang" class="text-gray-700 font-medium">中文</span>
                            <i class="fa fa-chevron-down text-gray-400 text-xs"></i>
                        </button>
                        <div id="lang-dropdown" class="hidden absolute right-0 mt-2 w-32 bg-white rounded-lg shadow-lg border border-gray-100 py-1">
                            <button onclick="switchLanguage('zh')" class="w-full text-left px-4 py-2 text-gray-700 hover:bg-blue-50 text-sm">中文</button>
                            <button onclick="switchLanguage('en')" class="w-full text-left px-4 py-2 text-gray-700 hover:bg-blue-50 text-sm">English</button>
                        </div>
                    </div>
                    <a href="contact.html" class="btn-gradient px-5 py-2.5 rounded-lg font-medium text-white" data-lang="nav-contact-btn">联系我们</a>
                </div>
                <button id="mobile-menu-btn" class="lg:hidden text-gray-600"><i class="fa fa-bars text-xl"></i></button>
            </div>
        </div>
        <div id="mobile-menu" class="lg:hidden hidden bg-white border-t">
            <div class="container mx-auto px-4 py-4">
                <div class="flex flex-col gap-3" id="mobile-nav"></div>
            </div>
        </div>
    </nav>

    <section class="pt-32 pb-20 bg-gradient-to-br from-blue-600 to-purple-700 text-white">
        <div class="container mx-auto px-4">
            <div class="max-w-3xl" id="page-header"></div>
        </div>
    </section>

    <section class="py-20 bg-white">
        <div class="container mx-auto px-4">
            <div class="grid lg:grid-cols-2 gap-16" id="contact-content"></div>
        </div>
    </section>

    <section class="py-12 bg-gray-50">
        <div class="container mx-auto px-4">
            <div class="bg-gray-200 rounded-xl h-64 flex items-center justify-center" id="map-content"></div>
        </div>
    </section>

    <footer class="bg-gray-900 text-white py-12" id="footer-content"></footer>

    <script>
        let currentLang = 'zh';

        function updateNavigation() {
            const mainNav = document.getElementById('main-nav');
            const mobileNav = document.getElementById('mobile-nav');
            const navItems = siteConfig.navigation[currentLang];
            
            mainNav.innerHTML = '';
            navItems.forEach(item => {
                const a = document.createElement('a');
                a.href = item.url;
                a.className = `nav-link font-medium ${item.id === 'contact' ? 'text-blue-600' : 'text-gray-600 hover:text-blue-600 transition-colors'}`;
                a.textContent = item.name;
                mainNav.appendChild(a);
            });
            
            mobileNav.innerHTML = '';
            navItems.forEach(item => {
                const a = document.createElement('a');
                a.href = item.url;
                a.className = `font-medium ${item.id === 'contact' ? 'text-blue-600' : 'text-gray-600 hover:text-blue-600'} py-2`;
                a.textContent = item.name;
                mobileNav.appendChild(a);
            });
            
            const langDiv = document.createElement('div');
            langDiv.className = 'flex items-center gap-4 pt-3 border-t';
            langDiv.innerHTML = `
                <button onclick="switchLanguage('zh')" class="px-3 py-1 border rounded hover:border-blue-500 text-sm">中文</button>
                <button onclick="switchLanguage('en')" class="px-3 py-1 border rounded hover:border-blue-500 text-sm">English</button>
            `;
            mobileNav.appendChild(langDiv);
        }

        function updatePageHeader() {
            const header = document.getElementById('page-header');
            const content = siteConfig.contact[currentLang].header;
            header.innerHTML = `
                <span class="text-blue-200 font-semibold text-sm tracking-wider uppercase">${content.tag}</span>
                <h1 class="text-4xl md:text-5xl font-bold mt-3 mb-6">${content.title}</h1>
                <p class="text-xl text-blue-100">${content.description}</p>
            `;
        }

        function updateContactContent() {
            const content = document.getElementById('contact-content');
            const contact = siteConfig.contact[currentLang];
            content.innerHTML = `
                <div>
                    <h2 class="text-2xl font-bold text-gray-900 mb-6">${contact.info.title}</h2>
                    <div class="space-y-6">
                        ${contact.info.items.map(item => `
                            <div class="flex items-start gap-4">
                                <div class="w-12 h-12 ${item.icon.bg} rounded-xl flex items-center justify-center flex-shrink-0">
                                    <i class="fa ${item.icon.class} text-xl ${item.icon.color}"></i>
                                </div>
                                <div>
                                    <h3 class="font-bold text-gray-900 mb-1">${item.title}</h3>
                                    <p class="text-gray-600">${item.content}</p>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                    <div class="mt-10">
                        <h3 class="font-bold text-gray-900 mb-4">${contact.follow.title}</h3>
                        <div class="flex gap-4">
                            ${contact.follow.social.map(social => `
                                <a href="${social.url}" class="w-12 h-12 bg-gray-100 rounded-full flex items-center justify-center hover:bg-blue-600 hover:text-white transition-colors text-gray-600">
                                    <i class="fa ${social.icon}"></i>
                                </a>
                            `).join('')}
                        </div>
                    </div>
                </div>
                <div>
                    <h2 class="text-2xl font-bold text-gray-900 mb-6">${contact.form.title}</h2>
                    <form id="contact-form" class="space-y-6">
                        <div class="grid sm:grid-cols-2 gap-6">
                            <div>
                                <label class="block text-gray-700 mb-2 font-medium">${contact.form.fields.name.label}</label>
                                <input type="text" class="form-input w-full px-4 py-3 rounded-lg border border-gray-300 focus:outline-none" placeholder="${contact.form.fields.name.placeholder}">
                            </div>
                            <div>
                                <label class="block text-gray-700 mb-2 font-medium">${contact.form.fields.email.label}</label>
                                <input type="email" class="form-input w-full px-4 py-3 rounded-lg border border-gray-300 focus:outline-none" placeholder="${contact.form.fields.email.placeholder}">
                            </div>
                        </div>
                        <div>
                            <label class="block text-gray-700 mb-2 font-medium">${contact.form.fields.phone.label}</label>
                            <input type="tel" class="form-input w-full px-4 py-3 rounded-lg border border-gray-300 focus:outline-none" placeholder="${contact.form.fields.phone.placeholder}">
                        </div>
                        <div>
                            <label class="block text-gray-700 mb-2 font-medium">${contact.form.fields.subject.label}</label>
                            <input type="text" class="form-input w-full px-4 py-3 rounded-lg border border-gray-300 focus:outline-none" placeholder="${contact.form.fields.subject.placeholder}">
                        </div>
                        <div>
                            <label class="block text-gray-700 mb-2 font-medium">${contact.form.fields.message.label}</label>
                            <textarea rows="5" class="form-input w-full px-4 py-3 rounded-lg border border-gray-300 focus:outline-none" placeholder="${contact.form.fields.message.placeholder}"></textarea>
                        </div>
                        <button type="submit" class="btn-gradient w-full px-6 py-4 rounded-lg font-semibold text-white">${contact.form.submit}</button>
                    </form>
                </div>
            `;
            
            // Add form submission handler
            document.getElementById('contact-form').addEventListener('submit', function(e) {
                e.preventDefault();
                alert(currentLang === 'zh' ? '消息已发送，我们会尽快与您联系！' : 'Message sent! We will contact you soon.');
                this.reset();
            });
        }

        function updateMap() {
            const map = document.getElementById('map-content');
            const content = siteConfig.contact[currentLang].map;
            map.innerHTML = `<p class="text-gray-500">${content.text}</p>`;
        }

        function updateFooter() {
            const footer = document.getElementById('footer-content');
            const content = siteConfig.footer[currentLang];
            footer.innerHTML = `
                <div class="container mx-auto px-4">
                    <div class="grid md:grid-cols-4 gap-12 mb-12">
                        <div>
                            <div class="flex items-center gap-3 mb-6">
                                <div class="w-10 h-10 bg-gradient-to-br from-blue-500 to-purple-600 rounded-lg flex items-center justify-center">
                                    <span class="text-white font-bold text-lg">${siteConfig.site.logo.icon}</span>
                                </div>
                                <span class="text-xl font-bold">${siteConfig.site.name}</span>
                            </div>
                            <p class="text-gray-400">${content.description}</p>
                        </div>
                        <div>
                            <h4 class="font-bold mb-4">${content.quickLinks.title}</h4>
                            <ul class="space-y-2">
                                ${content.quickLinks.links.map(link => `<li><a href="${link.url}" class="text-gray-400 hover:text-white transition-colors">${link.name}</a></li>`).join('')}
                            </ul>
                        </div>
                        <div>
                            <h4 class="font-bold mb-4">${content.contact.title}</h4>
                            <ul class="space-y-2 text-gray-400">
                                <li><i class="fa fa-map-marker mr-2"></i> ${content.contact.address}</li>
                                <li><i class="fa fa-phone mr-2"></i> ${content.contact.phone}</li>
                                <li><i class="fa fa-envelope mr-2"></i> ${content.contact.email}</li>
                            </ul>
                        </div>
                        <div>
                            <h4 class="font-bold mb-4">${content.follow.title}</h4>
                            <div class="flex gap-4">
                                ${content.follow.social.map(social => `<a href="${social.url}" class="w-10 h-10 bg-gray-800 rounded-full flex items-center justify-center hover:bg-blue-600 transition-colors"><i class="fa ${social.icon}"></i></a>`).join('')}
                            </div>
                        </div>
                    </div>
                    <div class="border-t border-gray-800 pt-8 text-center text-gray-400">
                        <p>&copy; 2026 ${siteConfig.site.name}. ${content.rights}</p>
                    </div>
                </div>
            `;
        }

        function updateContent() {
            updateNavigation();
            updatePageHeader();
            updateContactContent();
            updateMap();
            updateFooter();
        }

        function switchLanguage(lang) {
            currentLang = lang;
            updateContent();
            document.getElementById('current-lang').textContent = currentLang === 'zh' ? '中文' : 'English';
            document.getElementById('lang-dropdown').classList.add('hidden');
            document.documentElement.lang = currentLang === 'zh' ? 'zh-CN' : 'en';
        }

        document.getElementById('lang-switcher').addEventListener('click', function(e) {
            e.stopPropagation();
            document.getElementById('lang-dropdown').classList.toggle('hidden');
        });
        document.addEventListener('click', function() { document.getElementById('lang-dropdown').classList.add('hidden'); });
        document.getElementById('mobile-menu-btn').addEventListener('click', function() { document.getElementById('mobile-menu').classList.toggle('hidden'); });

        // Initialize
        updateContent();
    </script>
</body>
</html>
