<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="keywords" id="meta-keywords">
    <meta name="description" id="meta-description">
    <meta name="author" id="meta-author">
    <title id="page-title"></title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script src="config.js"></script>
    <script>
        // 设置SEO元标签
        document.addEventListener('DOMContentLoaded', function() {
            const seo = siteConfig.seo.zh.cases;
            const siteSeo = siteConfig.site.seo;
            
            document.getElementById('page-title').textContent = seo.title;
            document.getElementById('meta-description').setAttribute('content', seo.description);
            document.getElementById('meta-keywords').setAttribute('content', siteSeo.keywords);
            document.getElementById('meta-author').setAttribute('content', siteSeo.author);
            
            // 加载配色方案
            loadColorScheme();
        });
        
        // 加载配色方案
        function loadColorScheme() {
            const colors = siteConfig.colors[siteConfig.colors.current];
            const root = document.documentElement;
            
            // 设置CSS变量
            root.style.setProperty('--primary-color', colors.primary);
            root.style.setProperty('--secondary-color', colors.secondary);
            root.style.setProperty('--accent-color', colors.accent);
            root.style.setProperty('--white-color', colors.white || colors.primary);
            root.style.setProperty('--light-gray', colors.lightGray);
            root.style.setProperty('--medium-gray', colors.mediumGray);
            root.style.setProperty('--dark-gray', colors.darkGray);
            root.style.setProperty('--text-color', colors.text || colors.darkGray);
            root.style.setProperty('--dark-text', colors.darkText || colors.black || colors.darkGray);
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        :root {
            --primary-color: #1e40af;
            --secondary-color: #3b82f6;
            --accent-color: #93c5fd;
            --white-color: #ffffff;
            --light-gray: #f3f4f6;
            --medium-gray: #9ca3af;
            --dark-gray: #374151;
            --text-color: #374151;
            --dark-text: #111827;
        }
        body { font-family: 'Inter', sans-serif; color: var(--text-color); }
        .btn-gradient { background: linear-gradient(135deg, var(--secondary-color) 0%, #8b5cf6 100%); transition: all 0.3s ease; }
        .btn-gradient:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(59, 130, 246, 0.3); }
        .card-hover { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .card-hover:hover { transform: translateY(-8px); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25); }
    </style>
</head>
<body class="bg-gray-50">
    <nav class="bg-white/95 backdrop-blur-md shadow-sm fixed w-full z-50">
        <div class="container mx-auto px-4 py-4">
            <div class="flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-gradient-to-br from-blue-500 to-purple-600 rounded-lg flex items-center justify-center">
                        <span class="text-white font-bold text-lg">T</span>
                    </div>
                    <a href="index.html" class="text-2xl font-bold text-gray-800">TradePro</a>
                </div>
                <div class="hidden lg:flex items-center gap-8" id="main-nav"></div>
                <div class="hidden lg:flex items-center gap-4">
                    <a href="contact.html" class="btn-gradient px-5 py-2.5 rounded-lg font-medium text-white">联系我们</a>
                </div>
                <button id="mobile-menu-btn" class="lg:hidden text-gray-600"><i class="fa fa-bars text-xl"></i></button>
            </div>
        </div>
        <div id="mobile-menu" class="lg:hidden hidden bg-white border-t">
            <div class="container mx-auto px-4 py-4">
                <div class="flex flex-col gap-3" id="mobile-nav"></div>
            </div>
        </div>
    </nav>

    <section class="pt-32 pb-20 bg-gradient-to-br from-blue-600 to-purple-700 text-white">
        <div class="container mx-auto px-4">
            <div class="max-w-3xl" id="page-header"></div>
        </div>
    </section>

    <section class="py-20 bg-white">
        <div class="container mx-auto px-4">
            <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-8" id="cases-grid"></div>
        </div>
    </section>

    <section class="py-20 bg-gray-900 text-white">
        <div class="container mx-auto px-4 text-center" id="cta-content"></div>
    </section>

    <footer class="bg-gray-900 text-white py-12" id="footer-content"></footer>

    <script>
        function updateNavigation() {
            const mainNav = document.getElementById('main-nav');
            const mobileNav = document.getElementById('mobile-nav');
            const navItems = siteConfig.navigation.zh;
            
            mainNav.innerHTML = '';
            navItems.forEach(item => {
                const a = document.createElement('a');
                a.href = item.url;
                a.className = `nav-link font-medium ${item.id === 'cases' ? 'text-blue-600' : 'text-gray-600 hover:text-blue-600 transition-colors'}`;
                a.textContent = item.name;
                mainNav.appendChild(a);
            });
            
            mobileNav.innerHTML = '';
            navItems.forEach(item => {
                const a = document.createElement('a');
                a.href = item.url;
                a.className = `font-medium ${item.id === 'cases' ? 'text-blue-600' : 'text-gray-600 hover:text-blue-600'} py-2`;
                a.textContent = item.name;
                mobileNav.appendChild(a);
            });
        }

        function updatePageHeader() {
            const header = document.getElementById('page-header');
            const content = siteConfig.cases.zh.page;
            header.innerHTML = `
                <span class="text-blue-200 font-semibold text-sm tracking-wider uppercase">${content.tag}</span>
                <h1 class="text-4xl md:text-5xl font-bold mt-3 mb-6">${content.title}</h1>
                <p class="text-xl text-blue-100">${content.desc}</p>
            `;
        }

        function updateCases() {
            const grid = document.getElementById('cases-grid');
            const cases = siteConfig.cases.zh.items;
            grid.innerHTML = '';
            
            const colors = ['blue', 'purple', 'green', 'orange'];
            
            cases.forEach((item, index) => {
                const caseCard = document.createElement('div');
                caseCard.className = 'card-hover bg-gray-50 rounded-2xl overflow-hidden';
                
                const color = colors[index % colors.length];
                const initial = item.title.split(' ')[0][0];
                
                caseCard.innerHTML = `
                    <div class="h-48 bg-${color}-600 flex items-center justify-center">
                        <span class="text-white text-6xl font-bold">${initial}</span>
                    </div>
                    <div class="p-8">
                        <div class="flex gap-2 mb-4">
                            ${item.tags.map(tag => `<span class="px-3 py-1 bg-${color}-100 text-${color}-600 text-xs rounded-full">${tag}</span>`).join('')}
                        </div>
                        <h3 class="text-xl font-bold text-gray-900 mb-3">${item.title}</h3>
                        <p class="text-gray-600 mb-6">${item.desc}</p>
                        <div class="flex items-center gap-4">
                            <div class="w-12 h-12 bg-${color}-500 rounded-full flex items-center justify-center font-bold text-white">${initial}</div>
                            <div>
                                <div class="font-semibold text-gray-900">客户</div>
                                <div class="text-gray-500 text-sm">全球合作伙伴</div>
                            </div>
                        </div>
                    </div>
                `;
                grid.appendChild(caseCard);
            });
        }

        function updateCta() {
            const cta = document.getElementById('cta-content');
            const content = siteConfig.cases.zh.cta;
            cta.innerHTML = `
                <h2 class="text-3xl md:text-4xl font-bold mb-6">${content.title}</h2>
                <p class="text-gray-400 mb-8 max-w-2xl mx-auto">${content.desc}</p>
                <a href="contact.html" class="btn-gradient px-8 py-4 rounded-lg font-semibold text-white inline-flex items-center gap-2">${content.btn} <i class="fa fa-arrow-right"></i></a>
            `;
        }

        function updateFooter() {
            const footer = document.getElementById('footer-content');
            const content = siteConfig.footer.zh;
            footer.innerHTML = `
                <div class="container mx-auto px-4">
                    <div class="grid md:grid-cols-4 gap-12 mb-12">
                        <div>
                            <div class="flex items-center gap-3 mb-6">
                                <div class="w-10 h-10 bg-gradient-to-br from-blue-500 to-purple-600 rounded-lg flex items-center justify-center">
                                    <span class="text-white font-bold text-lg">${siteConfig.site.logo.icon}</span>
                                </div>
                                <span class="text-xl font-bold">${siteConfig.site.name}</span>
                            </div>
                            <p class="text-gray-400">${content.description}</p>
                        </div>
                        <div>
                            <h4 class="font-bold mb-4">${content.quickLinks.title}</h4>
                            <ul class="space-y-2">
                                ${content.quickLinks.links.map(link => `<li><a href="${link.url}" class="text-gray-400 hover:text-white transition-colors">${link.name}</a></li>`).join('')}
                            </ul>
                        </div>
                        <div>
                            <h4 class="font-bold mb-4">${content.contact.title}</h4>
                            <ul class="space-y-2 text-gray-400">
                                <li><i class="fa fa-map-marker mr-2"></i> ${content.contact.address}</li>
                                <li><i class="fa fa-phone mr-2"></i> ${content.contact.phone}</li>
                                <li><i class="fa fa-envelope mr-2"></i> ${content.contact.email}</li>
                            </ul>
                        </div>
                        <div>
                            <h4 class="font-bold mb-4">${content.follow.title}</h4>
                            <div class="flex gap-4">
                                ${content.follow.social.map(social => `<a href="${social.url}" class="w-10 h-10 bg-gray-800 rounded-full flex items-center justify-center hover:bg-blue-600 transition-colors"><i class="fa ${social.icon}"></i></a>`).join('')}
                            </div>
                        </div>
                    </div>
                    <div class="border-t border-gray-800 pt-8 text-center text-gray-400">
                        <p>&copy; 2026 ${siteConfig.site.name}. ${content.rights}</p>
                    </div>
                </div>
            `;
        }

        function updateContent() {
            updateNavigation();
            updatePageHeader();
            updateCases();
            updateCta();
            updateFooter();
        }

        document.getElementById('mobile-menu-btn').addEventListener('click', function() { document.getElementById('mobile-menu').classList.toggle('hidden'); });

        // Initialize
        updateContent();
    </script>
</body>
</html>
